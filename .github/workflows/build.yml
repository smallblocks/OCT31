name: Build s9pk

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore: ['*.md', 'LICENSE']
    tags: ['v*']
  pull_request:
    paths-ignore: ['*.md', 'LICENSE']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Checkout wrapper repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone OpenClaw upstream
        run: |
          git clone --depth 1 https://github.com/openclaw/openclaw.git openclaw
          cd openclaw && git rev-parse HEAD

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang libclang-dev squashfs-tools-ng jq

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install start-cli
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCH=$(uname -m)
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ASSET_NAME="start-cli_${ARCH}-${OS}"
          DOWNLOAD_URL=$(curl -fsS \
            -H "Authorization: token ${GH_TOKEN}" \
            https://api.github.com/repos/Start9Labs/start-os/releases \
            | jq -r '[.[].assets[] | select(.name=="'"$ASSET_NAME"'")] | first | .browser_download_url')
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "Error: could not find $ASSET_NAME in Start9Labs/start-os releases"
            exit 1
          fi
          curl -fsSL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$DOWNLOAD_URL" -o /tmp/start-cli
          sudo install -m 755 /tmp/start-cli /usr/local/bin/start-cli
          start-cli --version

      - name: Configure signing key
        env:
          DEV_KEY: ${{ secrets.DEV_KEY }}
        run: |
          mkdir -p ~/.startos
          if [ -n "$DEV_KEY" ]; then
            printf '%s' "$DEV_KEY" > ~/.startos/developer.key.pem
          else
            start-cli init-key
          fi

      - name: npm install
        run: npm ci

      - name: TypeScript typecheck
        run: npm run check

      - name: Build s9pk (${{ matrix.arch }})
        run: |
          make ${{ matrix.arch }}
          ls -lh *.s9pk
          sha256sum *.s9pk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-${{ matrix.arch }}.s9pk
          path: openclaw_${{ matrix.arch }}.s9pk
          if-no-files-found: error
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/openclaw_*.s9pk
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-dev') }}
